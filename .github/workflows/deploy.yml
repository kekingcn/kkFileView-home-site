name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: kkview-home-site-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      KKVIEW_WINRM_HOST: ${{ secrets.KKVIEW_WINRM_HOST }}
      KKVIEW_WINRM_USERNAME: ${{ secrets.KKVIEW_WINRM_USERNAME }}
      KKVIEW_WINRM_PASSWORD: ${{ secrets.KKVIEW_WINRM_PASSWORD }}
      KKVIEW_WINRM_PORT: ${{ secrets.KKVIEW_WINRM_PORT }}
      KKVIEW_DEPLOY_PATH: ${{ secrets.KKVIEW_DEPLOY_PATH }}
      KKVIEW_REMOTE_ZIP_PATH: ${{ secrets.KKVIEW_REMOTE_ZIP_PATH }}
      KKVIEW_DEPLOY_UPLOAD_URL: ${{ secrets.KKVIEW_DEPLOY_UPLOAD_URL }}
      KKVIEW_DEPLOY_UPLOAD_USERNAME: ${{ secrets.KKVIEW_DEPLOY_UPLOAD_USERNAME }}
      KKVIEW_DEPLOY_UPLOAD_PASSWORD: ${{ secrets.KKVIEW_DEPLOY_UPLOAD_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Pack site
        run: zip -qr dist.zip dist

      - name: Install deploy dependency
        run: python -m pip install --upgrade pywinrm

      - name: Upload site package
        run: |
          set -euo pipefail
          split -b 1m -d -a 3 dist.zip dist.zip.part-
          remote_parts_dir="${KKVIEW_REMOTE_ZIP_PATH}.parts"
          for part in dist.zip.part-*; do
            part_name="$(basename "${part}")"
            export KKVIEW_REMOTE_ZIP_PATH="${remote_parts_dir}\\${part_name}"
            python scripts/start-upload-listener.py
            curl --http1.1 --fail --show-error \
              --connect-timeout 20 --max-time 60 \
              -H "Expect:" \
              --user "${KKVIEW_DEPLOY_UPLOAD_USERNAME}:${KKVIEW_DEPLOY_UPLOAD_PASSWORD}" \
              --upload-file "${part}" \
              "${KKVIEW_DEPLOY_UPLOAD_URL}"
          done
          echo "KKVIEW_REMOTE_PARTS_DIR=${remote_parts_dir}" >> "${GITHUB_ENV}"

      - name: Deploy to Windows Nginx
        run: python scripts/deploy-winrm.py --remote-zip "${KKVIEW_REMOTE_ZIP_PATH}" --remote-parts-dir "${KKVIEW_REMOTE_PARTS_DIR}"
